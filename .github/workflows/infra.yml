name: Infrastructure

on:
  push:
    branches: [master]
    paths: [infra/**]
  pull_request:
    branches: [master]
    paths: [infra/**]

env:
  TF_VERSION: "1.10.0"
  WORKING_DIR: infra

permissions:
  contents: read
  id-token: write
  pull-requests: write   # for posting plan output as a PR comment

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/123251553865/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: network-monitor@internal-automation-385014.iam.gserviceaccount.com

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      # Post plan output as a comment on PRs
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('terraform show -no-color tfplan', {
              cwd: '${{ env.WORKING_DIR }}'
            }).toString();
            const body = `## Terraform Plan\n\`\`\`\n${plan.slice(0, 65000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
